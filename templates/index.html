<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Sentiment Analysis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    background:linear-gradient(135deg,#141e30,#243b55);
    font-family:Arial,sans-serif;
    color:white;
}

.main-card{
    max-width:900px;
    margin:40px auto;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

textarea{
    background:rgba(255,255,255,0.1)!important;
    color:white!important;
    border:none!important;
}

textarea::placeholder{
    color:#ddd!important;
}

.result-card{
    margin-top:25px;
    padding:20px;
    border-radius:20px;
    display:none;
}

.history-item{
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:10px;
    margin-top:8px;
}

.emoji{
    font-size:60px;
}

.progress{
    height:25px;
    border-radius:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="main-card">

<h1 class="text-center mb-4">
🤖 AI Sentiment Analysis
</h1>

<textarea
id="text"
class="form-control"
rows="6"
placeholder="Enter a sentence..."></textarea>

<button
class="btn btn-primary w-100 mt-3"
onclick="analyze()">
Analyze Sentiment
</button>

<div id="resultCard" class="result-card">

<div class="text-center">

<div id="emoji" class="emoji"></div>

<h2 id="sentiment"></h2>

<h4 id="confidence"></h4>

</div>

<div class="mt-4">

<h5>Confidence Level</h5>

<div class="progress">

<div
id="progressBar"
class="progress-bar"
role="progressbar">
</div>

</div>

</div>

</div>

<hr class="mt-4">

<h3>📜 Analysis History</h3>

<div id="history"></div>

</div>

</div>

<script>

let historyList=[];

function updateHistory(){

    let html="";

    historyList.forEach(item=>{

        html+=`
        <div class="history-item"
             style="cursor:pointer"
             onclick="loadSentence('${item.text.replace(/'/g, "\\'")}')">
             ${item.text} ➜ ${item.sentiment}
        </div>
        `;

    });

    document.getElementById("history").innerHTML=html;
}

function loadSentence(sentence){

    document.getElementById("text").value = sentence;

    document.getElementById("text").focus();

}

async function analyze(){

let text=document.getElementById("text").value;

if(text.trim()==""){
    alert("Please enter a sentence");
    return;
}

let response=await fetch("/analyze",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
text:text
})

});

let data=await response.json();

let sentiment=data.label.toLowerCase();
let confidence=data.score;

let emoji="😐";
let bg="#6c757d";

if(sentiment.includes("positive")){
    emoji="😊";
    bg="#198754";
}
else if(sentiment.includes("negative")){
    emoji="😡";
    bg="#dc3545";
}
else{
    emoji="😐";
    bg="#6c757d";
}

document.getElementById("resultCard").style.display="block";
document.getElementById("resultCard").style.background=bg;

document.getElementById("emoji").innerHTML=emoji;

document.getElementById("sentiment").innerHTML=
"Sentiment : "+sentiment;

document.getElementById("confidence").innerHTML=
"Confidence : "+confidence+"%";

document.getElementById("progressBar").style.width=
confidence+"%";

document.getElementById("progressBar").innerHTML=
confidence+"%";

historyList.unshift({
    text:text,
    sentiment:sentiment
});

updateHistory();

}

</script>

</body>
</html>
